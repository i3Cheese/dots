set-option -g mouse 1
set-option -g status-style bg=#3e3e3e
NNN_PLUG="x:!chmod +x $nnn;p:preview-tui"
NNN_FIFO="/tmp/nnn.fifo"

# macOS system accent colors (use in formats as #{@macos_blue}, etc.)
set -g @macos_blue "#1ba1e2"
set -g @macos_brown "#a05000"
set -g @macos_green "#339933"
set -g @macos_lime "#a2c139"
set -g @macos_magenta "#d80073"
set -g @macos_mango "#f09609"
set -g @macos_pink "#e671b8"
set -g @macos_purple "#a200ff"
set -g @macos_red "#e51400"
set -g @macos_teal "#00aba9"

%if "#{==:#{host},i3Cheese-MacBook.local}"
set -g status-style "bg=#{@macos_red}"
%elif "#{==:#{host},ML4RR9YFQ4}"
set -g status-style "bg=#{@macos_green} fg=#000000"
%elif "#{==:#{host},steamdeck}"
set -g status-style bg=#4060a0
%else
set -g status-style bg=#ff2026
%endif

set -g default-terminal "screen-256color"
set-option -sg escape-time 10
set-option -g focus-events on


# Toggle mouse on
bind-key M \
  set-option -g mouse on \;\
  display-message 'Mouse: ON'

# Toggle mouse off
bind-key m \
  set-option -g mouse off \;\
  display-message 'Mouse: OFF'

bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# copy to system keyboard
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "copy"


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
#
#
set -g status-right "%a %h-%d %H:%M"

